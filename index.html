<!DOCTYPE html>
<html>
<head>
  <title>AtomNews</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }

    header {
      background: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      color: red;
      margin: 0;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .hero {
      height: 300px;
      background: url('https://picsum.photos/1200/400') center/cover;
      display: flex;
      align-items: end;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>ATOMNEWS</h1>
  <nav>
    <a href="login.html">Login</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<div class="hero">
  🚨 Breaking News Today
</div>

<div class="container" id="news"></div>

<script type="module">
  import { db } from "./firebase.js";
  import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const newsDiv = document.getElementById("news");

  const querySnapshot = await getDocs(collection(db, "news"));

  querySnapshot.forEach(doc => {
    const data = doc.data();

    newsDiv.innerHTML += `
      <div class="card">
        <img src="https://picsum.photos/400/200">
        <div class="card-content">
          <h3>${data.title}</h3>
          <p>${data.content}</p>
        </div>
      </div>
    `;
  });
</script>

</body>
</html>
